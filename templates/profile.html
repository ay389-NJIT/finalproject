{% extends "layout.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold mb-6 text-gray-800">My Profile</h1>

  <!-- Success/Error Messages -->
  <div id="successMsg" class="hidden bg-green-100 border border-green-500 text-green-800 px-4 py-3 rounded-md mb-4">
    <span id="successText"></span>
  </div>
  <div id="errorMsg" class="hidden bg-red-100 border border-red-500 text-red-800 px-4 py-3 rounded-md mb-4">
    <span id="errorText"></span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    
    <!-- Profile Information Card -->
    <div class="bg-white shadow-lg rounded-lg p-6">
      <h2 class="text-xl font-bold mb-4">Profile Information</h2>
      <form id="profileForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">First Name</label>
          <input type="text" id="firstName" class="w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Last Name</label>
          <input type="text" id="lastName" class="w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" id="email" class="w-full border rounded px-3 py-2" required />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Username</label>
          <input type="text" id="username" class="w-full border rounded px-3 py-2" required />
        </div>
        <button type="submit" class="w-full bg-blue-700 text-white py-2 rounded hover:bg-blue-800">
          Update Profile
        </button>
      </form>
    </div>

    <!-- Change Password Card -->
    <div class="bg-white shadow-lg rounded-lg p-6">
      <h2 class="text-xl font-bold mb-4">Change Password</h2>
      <form id="passwordForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Current Password</label>
          <input type="password" id="currentPassword" class="w-full border rounded px-3 py-2" required minlength="8" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">New Password</label>
          <input type="password" id="newPassword" class="w-full border rounded px-3 py-2" required minlength="8" />
          <p class="text-xs text-gray-500 mt-1">Min 8 characters</p>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Confirm Password</label>
          <input type="password" id="confirmPassword" class="w-full border rounded px-3 py-2" required minlength="8" />
        </div>
        <button type="submit" class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700">
          Change Password
        </button>
      </form>
    </div>
  </div>

  <div class="mt-6">
    <a href="/dashboard" class="text-blue-700 hover:underline">← Back to Dashboard</a>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '/login';

  // Load current profile data
  async function loadProfile() {
    try {
      const res = await fetch('/api/profile', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (res.status === 401) {
        localStorage.removeItem('access_token');
        window.location.href = '/login';
        return;
      }
      
      const profile = await res.json();
      document.getElementById('firstName').value = profile.first_name;
      document.getElementById('lastName').value = profile.last_name;
      document.getElementById('email').value = profile.email;
      document.getElementById('username').value = profile.username;
    } catch (error) {
      document.getElementById('errorText').textContent = 'Failed to load profile';
      document.getElementById('errorMsg').classList.remove('hidden');
    }
  }

  // Update profile form submission
  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    try {
      const res = await fetch('/api/profile', {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          first_name: document.getElementById('firstName').value,
          last_name: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          username: document.getElementById('username').value
        })
      });
      
      const data = await res.json();
      
      if (res.ok) {
        document.getElementById('successText').textContent = 'Profile updated successfully!';
        document.getElementById('successMsg').classList.remove('hidden');
        document.getElementById('errorMsg').classList.add('hidden');
        
        // Update username in localStorage
        localStorage.setItem('username', data.username);
        
        setTimeout(() => {
          document.getElementById('successMsg').classList.add('hidden');
        }, 3000);
      } else {
        document.getElementById('errorText').textContent = data.detail || 'Update failed';
        document.getElementById('errorMsg').classList.remove('hidden');
        document.getElementById('successMsg').classList.add('hidden');
      }
    } catch (error) {
      document.getElementById('errorText').textContent = 'Network error';
      document.getElementById('errorMsg').classList.remove('hidden');
    }
  });

  // Change password form submission
  document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    
    // Validate passwords match
    if (newPass !== confirmPass) {
      document.getElementById('errorText').textContent = 'New passwords do not match';
      document.getElementById('errorMsg').classList.remove('hidden');
      document.getElementById('successMsg').classList.add('hidden');
      return;
    }
    
    try {
      const res = await fetch('/api/profile/password', {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          current_password: document.getElementById('currentPassword').value,
          new_password: newPass,
          confirm_new_password: confirmPass
        })
      });
      
      const data = await res.json();
      
      if (res.ok) {
        document.getElementById('successText').textContent = 'Password changed! Redirecting to login...';
        document.getElementById('successMsg').classList.remove('hidden');
        document.getElementById('errorMsg').classList.add('hidden');
        
        // Clear token and redirect to login after 2 seconds
        setTimeout(() => {
          localStorage.removeItem('access_token');
          localStorage.removeItem('username');
          window.location.href = '/login';
        }, 2000);
      } else {
        document.getElementById('errorText').textContent = data.detail || 'Password change failed';
        document.getElementById('errorMsg').classList.remove('hidden');
        document.getElementById('successMsg').classList.add('hidden');
      }
    } catch (error) {
      document.getElementById('errorText').textContent = 'Network error';
      document.getElementById('errorMsg').classList.remove('hidden');
    }
  });

  // Load profile on page load
  loadProfile();
</script>
{% endblock %}
